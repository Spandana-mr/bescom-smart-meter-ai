services:
  - type: web
    name: bescom-smart-meter-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

- type: static
  name: bescom-smart-meter-dashboard
  rootDir: frontend
  buildCommand: npm install && npm run build
  staticPublishPath: dist
  plan: free
  envVars:
    - key: NODE_VERSION
      value: 18
    - key: VITE_API_URL
      fromService:
        type: web
        name: bescom-smart-meter-api
        property: host
